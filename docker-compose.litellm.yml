services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./examples/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      app:
        condition: service_started
